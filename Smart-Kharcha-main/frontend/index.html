<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kharcha - Expense Tracker</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#10b981',
                        dark: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden-form {
            display: none;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-8 rounded-3xl relative overflow-hidden fade-in">
        <!-- Decoration -->
        <div class="absolute -top-16 -right-16 w-32 h-32 bg-primary rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
        <div class="absolute -bottom-16 -left-16 w-32 h-32 bg-secondary rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>

        <div class="relative z-10 text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Smart Kharcha <span class="text-primary">.</span></h1>
            <p class="text-gray-500 mt-2">Manage your expenses effortlessly.</p>
        </div>

        <div id="error-message" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-6">
            <div>
                <label for="login-email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="login-email" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="you@example.com">
            </div>
            <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="login-password" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform hover:-translate-y-0.5">
                Sign In
            </button>
            <p class="text-center text-sm text-gray-600 mt-4">
                Don't have an account? 
                <button type="button" id="show-register" class="font-medium text-primary hover:text-indigo-500 transition-colors">Sign up</button>
            </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="space-y-5 hidden-form">
            <div>
                <label for="register-name" class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="register-name" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="John Doe">
            </div>
            <div>
                <label for="register-email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="register-email" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="you@example.com">
            </div>
            <div>
                <label for="register-password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="register-password" required class="mt-1 block w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-secondary hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-all duration-200 transform hover:-translate-y-0.5">
                Create Account
            </button>
            <p class="text-center text-sm text-gray-600 mt-4">
                Already have an account? 
                <button type="button" id="show-login" class="font-medium text-secondary hover:text-emerald-500 transition-colors">Sign in</button>
            </p>
        </form>
    </div>

    <script type="module" src="./js/auth.js"></script>
</body>
</html>
