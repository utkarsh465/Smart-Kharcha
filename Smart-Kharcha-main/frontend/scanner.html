<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanner - Smart Kharcha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#4f46e5', secondary: '#10b981', danger: '#ef4444' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>body { font-family: 'Inter', sans-serif; background: #f8fafc; }</style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full shadow-sm z-20 hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Smart Kharcha<span class="text-primary">.</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 font-medium rounded-xl transition-colors">
                <i class="ph ph-squares-four text-xl"></i> Dashboard
            </a>
            <a href="calendar.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 font-medium rounded-xl transition-colors">
                <i class="ph ph-calendar text-xl"></i> Calendar
            </a>
            <a href="scanner.html" class="flex items-center gap-3 px-4 py-3 bg-primary/10 text-primary font-medium rounded-xl transition-colors">
                <i class="ph ph-receipt text-xl"></i> Scanner
            </a>
            <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 font-medium rounded-xl transition-colors">
                <i class="ph ph-user text-xl"></i> Profile
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button onclick="localStorage.clear(); window.location.href='index.html'" class="flex w-full items-center gap-3 px-4 py-3 text-danger hover:bg-red-50 font-medium rounded-xl transition-colors">
                <i class="ph ph-sign-out text-xl"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-y-auto bg-gray-50">
        <header class="md:hidden h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4">
            <h1 class="text-lg font-bold text-gray-800">Smart Kharcha<span class="text-primary">.</span></h1>
            <button class="text-gray-600"><i class="ph ph-list text-2xl"></i></button>
        </header>

        <div class="p-8">
            <h2 class="text-2xl font-bold text-gray-800">Receipt Scanner</h2>
            <p class="text-gray-500 mt-1">Scan and automatically add expenses.</p>
            
            <div class="mt-8 bg-white p-10 rounded-2xl border border-gray-200 text-center shadow-sm">
                <i class="ph ph-camera text-6xl text-gray-300 mb-4 inline-block"></i>
                <h3 class="text-xl font-medium text-gray-700">Scanner Feature Coming Soon</h3>
                <p class="text-gray-500 mt-2 max-w-md mx-auto">Upload or capture an image of your receipt to automatically extract the details. Coming in the next update.</p>
                <button disabled class="mt-6 px-6 py-2 bg-gray-100 text-gray-400 rounded-lg cursor-not-allowed">Upload Image</button>
            </div>
        </div>
    </main>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'index.html';
    </script>
</body>
</html>
